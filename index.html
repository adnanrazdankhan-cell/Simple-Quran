  const [ripples, setRipples] = useState([]);
  const [pressed, setPressed] = useState(false);
  const btnRef = useRef(null);

  const addRipple = (e) => {
    const btn = btnRef.current;
    if (!btn) return;
    const rect = btn.getBoundingClientRect();
    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    const clientY = e.touches ? e.touches[0].clientY : e.clientY;
    const x = clientX - rect.left;
    const y = clientY - rect.top;
    const size = Math.max(rect.width, rect.height) * 2.2;
    const id = Date.now() + Math.random();
    setRipples(prev => [...prev, { x, y, size, id }]);
    setTimeout(() => setRipples(prev => prev.filter(r => r.id !== id)), 600);
  };

  const handleStart = (e) => { addRipple(e); setPressed(true); };
  const handleEnd = () => setPressed(false);

  return (
    <button
      ref={btnRef}
      onClick={onClick}
      onMouseDown={handleStart}
      onMouseUp={handleEnd}
      onMouseLeave={handleEnd}
      onTouchStart={handleStart}
      onTouchEnd={handleEnd}
      className={className}
      style={{
        ...style,
        position: "relative",
        overflow: "hidden",
        transform: pressed ? `scale(${scale})` : "scale(1)",
        transition: "transform 0.18s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.18s ease, opacity 0.18s ease",
        boxShadow: pressed
          ? (style?.boxShadow ? style.boxShadow.replace(/\d+px \d+px \d+px/, "0px 2px 4px") : "0 2px 8px rgba(0,0,0,0.15)")
          : style?.boxShadow || "none",
        cursor: "pointer",
      }}
    >
      {ripples.map(r => (
        <span
          key={r.id}
          style={{
            position: "absolute",
            left: r.x - r.size / 2,
            top: r.y - r.size / 2,
            width: r.size,
            height: r.size,
            borderRadius: "50%",
            background: rippleColor,
            pointerEvents: "none",
            animation: "rippleAnim 0.6s cubic-bezier(0.22,1,0.36,1) forwards",
            zIndex: 0,
          }}
        />
      ))}
      <span style={{ position: "relative", zIndex: 1, display: "flex", alignItems: "center", justifyContent: "center", gap: 8 }}>
        {children}
      </span>
    </button>
  );
};

  // Kaaba coordinates
  const KAABA_LAT = 21.4225;
  const KAABA_LNG = 39.8262;

  const calcQibla = (lat, lng) => {
    const toRad = d => d * Math.PI / 180;
    const toDeg = r => r * 180 / Math.PI;
    const dLng = toRad(KAABA_LNG - lng);
    const latR = toRad(lat);
    const kaabaLatR = toRad(KAABA_LAT);
    const y = Math.sin(dLng) * Math.cos(kaabaLatR);
    const x = Math.cos(latR) * Math.sin(kaabaLatR) - Math.sin(latR) * Math.cos(kaabaLatR) * Math.cos(dLng);
    return (toDeg(Math.atan2(y, x)) + 360) % 360;
  };

  const [qiblaAngle, setQiblaAngle] = useState(261); // Abu Dhabi default
  const [userLocation, setUserLocation] = useState(null);

        const { latitude, longitude } = pos.coords;
        setUserLocation({ lat: latitude, lng: longitude });
        setQiblaAngle(Math.round(calcQibla(latitude, longitude)));
        setLocationStatus("found");
      },
      () => {
        setLocationStatus("denied");

    const handler = (e) => {

      if (e.webkitCompassHeading != null) heading = e.webkitCompassHeading;

  useEffect(() => {

  const handleQuizAnswer = (idx) => {

  const recognitionRef = useRef(null);
  const aiRef = useRef(null);

  useEffect(() => {

  }, [aiMessages]);

  const startRecitation = useCallback((verse) => {
    if (!verse) return;

    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SpeechRecognition) {
      setRecitationScore({
        accuracy: 0,
        spokenText: "",
        wordResults: [],
        suggestion: "Speech recognition is not supported in this browser. Please use Chrome or Safari.",
        unsupported: true,
      });
      return;
    }

    if (recognitionRef.current) {
      recognitionRef.current.abort();
    }

    const recognition = new SpeechRecognition();
    recognition.lang = "ar-SA";
    recognition.continuous = false;
    recognition.interimResults = false;
    recognition.maxAlternatives = 3;
    recognitionRef.current = recognition;

    setIsRecording(true);
    setRecitationScore(null);

    recognition.onresult = (event) => {
      const spoken = Array.from(event.results[0])
        .map(alt => alt.transcript)
        .join(" ")
        .trim();

      // Compare spoken text against transliteration and arabic
      const referenceArabic = verse.arabic || "";
      const referenceTranslit = verse.transliteration || "";

      // Normalise Arabic: remove diacritics (tashkeel) for comparison
      const stripDiacritics = (str) =>
        str.replace(/[\u064B-\u065F\u0670]/g, "").replace(/\s+/g, " ").trim();

      const refNorm = stripDiacritics(referenceArabic).toLowerCase();
      const spokenNorm = stripDiacritics(spoken).toLowerCase();

      // Word-level comparison
      const refWords = refNorm.split(" ").filter(Boolean);
      const spokenWords = spokenNorm.split(" ").filter(Boolean);

      let matchedCount = 0;
      const wordResults = refWords.map((rw, i) => {
        const sw = spokenWords[i] || "";
        // Simple similarity: exact or starts-with or contains
        const exact = sw === rw;
        const close = rw.length > 2 && (sw.includes(rw.slice(0, 3)) || rw.includes(sw.slice(0, 3)));
        const status = exact ? "correct" : close ? "close" : "incorrect";
        if (exact || close) matchedCount++;
        return { word: verse.arabic.split(" ")[i] || rw, status, spoken: spokenWords[i] || "—" };
      });

      const accuracy = refWords.length > 0
        ? Math.round((matchedCount / refWords.length) * 100)
        : 0;

      const correctWords = wordResults.filter(w => w.status === "correct").map(w => w.word);
      const improveWords = wordResults.filter(w => w.status !== "correct").map(w => w.word);

      let suggestion = "";
      if (accuracy >= 90) suggestion = "Excellent recitation! Your pronunciation is very accurate. Keep practising to maintain this level. MashaAllah! 🌟";
      else if (accuracy >= 70) suggestion = `Good effort! Focus on the words: ${improveWords.slice(0,3).join(", ")}. Listen to a reciter and repeat each word slowly before reciting the full verse.`;
      else if (accuracy >= 40) suggestion = `Keep practising! Try reciting word-by-word first. Focus on: ${improveWords.slice(0,3).join(", ")}. Use the transliteration as a guide.`;
      else suggestion = "It seems the microphone may not have picked up your recitation clearly, or Arabic speech recognition needs practice. Try reciting louder and more clearly, or check your microphone settings.";

      setRecitationScore({ accuracy, spokenText: spoken, wordResults, correctWords, improveWords, suggestion });
      setIsRecording(false);
    };

    recognition.onerror = (event) => {
      setIsRecording(false);
      if (event.error === "no-speech") {
        setRecitationScore({ accuracy: 0, spokenText: "", wordResults: [], correctWords: [], improveWords: [], suggestion: "No speech was detected. Please make sure your microphone is on and try speaking clearly." });
      } else if (event.error === "not-allowed") {
        setRecitationScore({ accuracy: 0, spokenText: "", wordResults: [], correctWords: [], improveWords: [], suggestion: "Microphone access was denied. Please allow microphone access in your browser settings and try again." });
      } else {
        setRecitationScore({ accuracy: 0, spokenText: "", wordResults: [], correctWords: [], improveWords: [], suggestion: `Recognition error: ${event.error}. Please try again.` });
      }
    };

    recognition.onend = () => {
      setIsRecording(false);
    };

    try {
      recognition.start();
    } catch (e) {
      setIsRecording(false);
    }
  }, []);

  const stopRecitation = useCallback(() => {
    if (recognitionRef.current) recognitionRef.current.stop();
    setIsRecording(false);
  }, []);

  // ── Real MP3 Audio — Sheikh Mishary Rashid Alafasy via everyayah.com ──────
  // ── Audio Engine — everyayah.com MP3s, Sheikh Mishary Alafasy ─────────────
  // All state stored in refs so callbacks never go stale
  const audioRef = useRef(null);
  const audioStateRef = useRef({ surahId: null, verses: [], idx: 0, active: false });

  const getAyahUrl = (surahId, ayahNum) =>
    `https://everyayah.com/data/Alafasy_128kbps/${String(surahId).padStart(3,"0")}${String(ayahNum).padStart(3,"0")}.mp3`;

  const playIdxInternal = (idx) => {
    const { surahId, verses, active } = audioStateRef.current;
    if (!active || idx >= verses.length || idx < 0) {
      setIsPlaying(false);
      setAudioLoading(false);
      return;
    }
    const verse = verses[idx];
    audioStateRef.current.idx = idx;
    setPlayingIdx(idx);
    setCurrentVerseIdx(idx);
    setAudioLoading(true);
    setIsPlaying(false);

    if (audioRef.current) {
      audioRef.current.oncanplaythrough = null;
      audioRef.current.onended = null;
      audioRef.current.onerror = null;
      audioRef.current.pause();
    }

    const audio = new Audio(getAyahUrl(surahId, verse.number));
    audioRef.current = audio;

    audio.oncanplaythrough = () => {
      setAudioLoading(false);
      setIsPlaying(true);
      audio.play().catch(() => setIsPlaying(false));
    };
    audio.onended = () => {
      setIsPlaying(false);
      // Use ref so this callback always has fresh idx
      playIdxInternal(audioStateRef.current.idx + 1);
    };
    audio.onerror = () => {
      setAudioLoading(false);
      setIsPlaying(false);
      // Skip broken ayah and continue
      playIdxInternal(audioStateRef.current.idx + 1);
    };
    audio.load();
  };

  const playFromIdx = useCallback((surahId, verses, startIdx) => {
    audioStateRef.current = { surahId, verses, idx: startIdx, active: true };
    playIdxInternal(startIdx);
  }, []);

  const stopAudio = useCallback(() => {
    audioStateRef.current.active = false;
    if (audioRef.current) {
      audioRef.current.oncanplaythrough = null;
      audioRef.current.onended = null;
      audioRef.current.onerror = null;
      audioRef.current.pause();
      audioRef.current = null;
    }
    setIsPlaying(false);
    setAudioLoading(false);
  }, []);

  const pauseAudio = useCallback(() => {
    if (audioRef.current && !audioRef.current.paused) {
      audioRef.current.pause();
      setIsPlaying(false);

    headerTitle: { color: "#f0d080", fontSize: 18, fontWeight: "bold", letterSpacing: 0.5 },
    headerSub: { color: "#a8d4b0", fontSize: 11, marginTop: 2 },

          const needleRotation = compassHeading !== null
            ? (qiblaAngle - compassHeading + 360) % 360
            : qiblaAngle;

          // Is the needle pointing very close to qibla? (within 5 degrees)
          const onTarget = compassHeading !== null && Math.abs(((qiblaAngle - compassHeading + 540) % 360) - 180) > 175;

          return (
            <div style={{ position: "relative", width: 200, height: 200, margin: "0 auto 16px" }}>
              {/* Outer glow when aligned */}
              {onTarget && <div style={{ position: "absolute", inset: -6, borderRadius: "50%", background: `${gold}22`, animation: "glowPulse 1s infinite" }} />}

              {/* Compass ring */}
              <div style={{
                width: 200, height: 200, borderRadius: "50%",
                border: `3px solid ${onTarget ? gold : (dm ? "#1e3a5f" : "#d4c4a0")}`,
                background: dm ? "linear-gradient(135deg, #0d1b2a, #1a2a3a)" : "linear-gradient(135deg, #f8f4ef, #ede8e0)",
                position: "relative", display: "flex", alignItems: "center", justifyContent: "center",
                boxShadow: onTarget ? `0 0 24px ${gold}55` : "none",
                transition: "border-color 0.3s, box-shadow 0.3s",
              }}>
                {/* Cardinal labels — fixed, don't rotate */}
                {[["N","top","50%","auto","auto","auto","-50%","0"],
                  ["S","bottom","50%","auto","8px","auto","-50%","0"],
                  ["E","auto","8px","50%","auto","auto","0","-50%"],
                  ["W","auto","auto","50%","auto","8px","0","-50%"]
                ].map(([label,t,l,tt,b,r,tx,ty]) => (
                  <div key={label} style={{
                    position: "absolute", top: t, left: l, bottom: b, right: r,
                    transform: `translate(${tx}, ${ty})`,
                    fontSize: 12, fontWeight: "bold",
                    color: label === "N" ? "#ef4444" : subtext,
                    fontFamily: "system-ui",
                  }}>{label}</div>
                ))}

                {/* Degree ticks */}
                {Array.from({ length: 36 }, (_, i) => (
                  <div key={i} style={{
                    position: "absolute", top: "50%", left: "50%",
                    width: i % 9 === 0 ? 2 : 1,
                    height: i % 9 === 0 ? 12 : 7,
                    background: i % 9 === 0 ? gold : (dm ? "#2a3a4a" : "#c0b090"),
                    transformOrigin: "top center",
                    transform: `rotate(${i * 10}deg) translateX(-50%) translateY(-${95}px)`,
                    borderRadius: 1,
                  }} />
                ))}

                {/* Qibla needle — a proper arrow */}
                <div style={{
                  position: "absolute", top: "50%", left: "50%",
                  width: 0, height: 0,
                  transform: `translate(-50%, -50%) rotate(${needleRotation}deg)`,
                  transition: compassHeading !== null ? "transform 0.15s ease-out" : "none",
                }}>
                  {/* Arrow shaft */}
                  <div style={{
                    position: "absolute", left: "50%", bottom: 0,
                    width: 4, height: 70,
                    background: `linear-gradient(to top, ${dm ? "#1a2a3a" : "#e0d8c8"}, ${gold})`,
                    borderRadius: "2px 2px 0 0",
                    transform: "translateX(-50%)",
                  }} />
                  {/* Arrowhead */}
                  <div style={{
                    position: "absolute", left: "50%", bottom: 68,
                    width: 0, height: 0,
                    borderLeft: "8px solid transparent",
                    borderRight: "8px solid transparent",
                    borderBottom: `20px solid ${gold}`,
                    transform: "translateX(-50%)",
                  }} />
                  {/* Kaaba emoji at tip */}
                  <div style={{
                    position: "absolute", left: "50%", bottom: 88,
                    transform: "translateX(-50%)",
                    fontSize: 18,
                    lineHeight: 1,
                  }}>🕋</div>
                  {/* Tail */}
                  <div style={{
                    position: "absolute", left: "50%", top: 0,
                    width: 4, height: 24,
                    background: dm ? "#2a3a4a" : "#c0b090",
                    borderRadius: "0 0 2px 2px",
                    transform: "translateX(-50%)",
                  }} />
                </div>

                {/* Center dot */}
                <div style={{
                  width: 12, height: 12, borderRadius: "50%",
                  background: `linear-gradient(135deg, ${gold}, #8b6914)`,
                  boxShadow: `0 0 8px ${gold}88`,
                  position: "relative", zIndex: 2,
                }} />
              </div>
            </div>
          );
        })()}

        {/* Status & info */}
        {compassHeading !== null ? (
          <div>
            <div style={{ color: gold, fontSize: 14, fontWeight: "bold", fontFamily: "system-ui" }}>
              🕋 {qiblaAngle}° from North
            </div>
            <div style={{ color: greenLight, fontSize: 12, fontFamily: "system-ui", marginTop: 4 }}>
              📱 Heading: {Math.round(compassHeading)}° · Live compass active
            </div>
          </div>
        ) : (
          <div>
            <div style={{ color: subtext, fontSize: 13, fontFamily: "system-ui", marginBottom: 12 }}>
              {compassPermission === "denied"
                ? "❌ Compass access denied. Please allow motion sensors in your browser settings."
                : compassPermission === "unsupported"
                ? "⚠️ Compass not supported on this device."
                : "Tap below to activate the live compass"}
            </div>
            {compassPermission !== "denied" && compassPermission !== "unsupported" && (
              <PressableButton
                onClick={startCompass}
                style={{ ...S.btn("gold"), margin: "0 auto", width: "auto" }}
                rippleColor="rgba(255,255,255,0.3)" scale={0.95}
              >
                🧭 Activate Live Compass
              </PressableButton>
            )}
            <div style={{ color: subtext, fontSize: 11, fontFamily: "system-ui", marginTop: 8 }}>
              Qibla: {qiblaAngle}° from North · {locationStatus === "found" ? "📍 Your location" : "📍 Abu Dhabi (default)"}
            </div>
          </div>
        )}
      </div>

      {/* Islamic Calendar */}
      <div style={S.card}>
        <div style={{ fontSize: 14, fontWeight: "bold", color: text, fontFamily: "system-ui", marginBottom: 12 }}>📅 Islamic Calendar</div>
        <div style={{ textAlign: "center", padding: "12px 0" }}>
          <div style={{ fontSize: 24, color: gold, fontWeight: "bold", fontFamily: "system-ui" }}>{hijriDate()}</div>
          <div style={{ color: greenLight, fontSize: 13, fontFamily: "system-ui", marginTop: 4 }}>🌙 Ramadan — Month of Mercy</div>
        </div>
        <div style={{ borderTop: `1px solid ${cardBorder}`, paddingTop: 12, marginTop: 4 }}>
          <div style={{ fontSize: 13, fontWeight: "bold", color: text, fontFamily: "system-ui", marginBottom: 8 }}>Upcoming Islamic Days</div>
          {[["Laylat al-Qadr", "Last 10 nights"], ["Eid al-Fitr", "1 Shawwal 1446"], ["Day of Arafah", "9 Dhu al-Hijjah 1446"]].map(([name, date], i) => (
            <div key={i} style={{ display: "flex", justifyContent: "space-between", padding: "6px 0", borderBottom: i < 2 ? `1px solid ${cardBorder}` : "none" }}>
              <span style={{ color: text, fontSize: 13, fontFamily: "system-ui" }}>{name}</span>
              <span style={{ ...S.badge(gold) }}>{date}</span>
            </div>
          ))}
        </div>
      </div>
    </div>
  );

  const ProfileScreen = () => (
    <div style={{ padding: 16 }}>
      <div style={{ ...S.card, background: dm ? "linear-gradient(135deg, #0d1b2a, #1a3a5c)" : "linear-gradient(135deg, #1a4a2e, #2d7a4f)", textAlign: "center", padding: 24 }}>
        <div style={{ width: 72, height: 72, borderRadius: "50%", background: `linear-gradient(135deg, ${gold}, #8b6914)`, display: "flex", alignItems: "center", justifyContent: "center", margin: "0 auto 12px", fontSize: 32 }}>🌙</div>
        <div style={{ fontSize: 20, fontWeight: "bold", color: "#ffffff", fontFamily: "system-ui" }}>My Learning Journey</div>
        <div style={{ color: "#a8d4b0", fontSize: 13, fontFamily: "system-ui", marginTop: 4 }}>May Allah bless your efforts</div>
        <div style={{ display: "flex", justifyContent: "center", gap: 8, marginTop: 12 }}>
          <div style={{ ...S.badge(gold) }}>🔥 {profile.streak} Day Streak</div>
          <div style={{ ...S.badge(greenLight) }}>Level: Intermediate</div>
        </div>
      </div>

      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12, marginBottom: 12 }}>
        {[
          { icon: "📖", label: "Surahs Read", value: profile.surahsRead, suffix: "/114" },
          { icon: "💾", label: "Verses Memorized", value: profile.versesMemorized, suffix: "" },
          { icon: "🏆", label: "Quiz Score", value: profile.quizScore, suffix: "%" },
          { icon: "⏱️", label: "Time Learning", value: Math.floor(profile.timeSpent / 60), suffix: " hrs" },
        ].map((stat, i) => (
          <div key={i} style={{ ...S.card, textAlign: "center" }}>
            <div style={{ fontSize: 28 }}>{stat.icon}</div>
            <div style={{ fontSize: 22, fontWeight: "bold", color: gold, fontFamily: "system-ui" }}>{stat.value}{stat.suffix}</div>
            <div style={{ fontSize: 12, color: subtext, fontFamily: "system-ui", marginTop: 2 }}>{stat.label}</div>
          </div>
        ))}
      </div>

      <div style={S.card}>
        <div style={{ fontSize: 14, fontWeight: "bold", color: text, fontFamily: "system-ui", marginBottom: 12 }}>📚 Bookmarked Verses</div>
        {bookmarks.length === 0 ? (
          <div style={{ textAlign: "center", color: subtext, padding: 20, fontFamily: "system-ui", fontSize: 13 }}>No bookmarks yet. Tap the 🔖 icon on any verse to save it.</div>
        ) : bookmarks.map((b, i) => {
          const [sId, vNum] = b.split("-").map(Number);
          const surah = SURAHS.find(s => s.id === sId);
          return (
            <div key={i} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "8px 0", borderBottom: i < bookmarks.length - 1 ? `1px solid ${cardBorder}` : "none" }}>
              <div style={{ fontFamily: "system-ui" }}>
                <div style={{ fontSize: 14, fontWeight: "600", color: text }}>{surah?.name} : {vNum}</div>
                <div style={{ fontSize: 12, color: subtext }}>{surah?.arabic}</div>
              </div>
              <PressableButton onClick={() => { setSelectedSurah(surah); setCurrentVerseIdx(vNum - 1); setActiveTab("surahs"); }} style={{ ...S.btn("outline"), padding: "6px 12px", fontSize: 12, width: "auto" }} rippleColor="rgba(201,168,76,0.2)" scale={0.92}>Read</PressableButton>
            </div>
          );
        })}
      </div>

      <div style={S.card}>
        <div style={{ fontSize: 14, fontWeight: "bold", color: text, fontFamily: "system-ui", marginBottom: 12 }}>⚙️ Settings</div>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "10px 0" }}>
          <div style={{ fontFamily: "system-ui", fontSize: 14, color: text }}>Dark Mode</div>
          <button
            onClick={() => setDarkMode(!dm)}
            style={{
              width: 52, height: 28, borderRadius: 14, border: "none", cursor: "pointer", padding: 0,
              background: dm ? `linear-gradient(135deg, ${green}, ${greenLight})` : "#cbd5e1",
              position: "relative", flexShrink: 0,
              boxShadow: dm ? `0 2px 12px ${greenLight}55` : "inset 0 1px 3px rgba(0,0,0,0.15)",
              transition: "background 0.3s ease, box-shadow 0.3s ease",
            }}
          >
            <div style={{
              width: 22, height: 22, borderRadius: "50%", background: "#ffffff",
              position: "absolute", top: 3,
              left: dm ? 27 : 3,
              transition: "left 0.3s cubic-bezier(0.34,1.56,0.64,1)",
              boxShadow: "0 1px 6px rgba(0,0,0,0.25)",
              display: "flex", alignItems: "center", justifyContent: "center",
              fontSize: 11,
            }}>
              {dm ? "🌙" : "☀️"}
            </div>
          </button>
        </div>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "10px 0", borderTop: `1px solid ${cardBorder}` }}>
          <div style={{ fontFamily: "system-ui", fontSize: 14, color: text }}>Daily Reminder Notifications</div>
          <div style={{ ...S.badge(greenLight) }}>On</div>
        </div>
      </div>
    </div>
  );

  const tabs = [
    { id: "home", label: "Home", icon: "home" },
    { id: "surahs", label: "Surahs", icon: "book" },
    { id: "memorize", label: "Learn", icon: "star" },
    { id: "daily", label: "AI Helper", icon: "sparkles" },
    { id: "tools", label: "Tools", icon: "tools" },
    { id: "profile", label: "Profile", icon: "user" },
  ];

  return (
    <div style={S.app}>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400&display=swap');
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #c9a84c44; border-radius: 2px; }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-6px); } }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes slideInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes scaleIn { from { opacity: 0; transform: scale(0.92); } to { opacity: 1; transform: scale(1); } }
        @keyframes rippleAnim { 0% { transform: scale(0); opacity: 1; } 100% { transform: scale(1); opacity: 0; } }
        @keyframes shimmer { 0% { background-position: -200% center; } 100% { background-position: 200% center; } }
        @keyframes tabPop { 0% { transform: scale(1); } 40% { transform: scale(1.22) translateY(-3px); } 70% { transform: scale(0.96); } 100% { transform: scale(1); } }
        @keyframes glowPulse { 0%, 100% { box-shadow: 0 0 0 0 rgba(201,168,76,0); } 50% { box-shadow: 0 0 0 8px rgba(201,168,76,0.18); } }
        @keyframes redGlowPulse { 0%, 100% { transform: scale(1); opacity: 0.15; } 50% { transform: scale(1.5); opacity: 0.35; } }
        button { -webkit-tap-highlight-color: transparent; }
        * { -webkit-font-smoothing: antialiased; }
      `}</style>

      {/* Header */}
      <div style={{ ...S.header, position: "sticky", top: 0, zIndex: 50 }}>
        <div>
          <div style={S.headerTitle}>☽ Simple Quran</div>
          <div style={S.headerSub}>Learn • Reflect • Connect</div>
        </div>
        <div style={{ display: "flex", gap: 10, alignItems: "center" }}>
          <PressableButton onClick={() => setDarkMode(!dm)} style={{ background: "transparent", border: "none", padding: 4, borderRadius: 8, color: "#a8d4b0", boxShadow: "none" }} rippleColor="rgba(168,212,176,0.3)" scale={0.85}>
            <Icon name={dm ? "sun" : "moon"} size={20} />
          </PressableButton>
          <div style={{ ...S.badge(gold), fontSize: 12 }}>🔥 {profile.streak}</div>
        </div>
      </div>

      {/* Content */}
      <div style={S.content}>
        {activeTab === "home" && <HomeScreen />}
        {activeTab === "surahs" && <SurahsScreen />}
        {activeTab === "memorize" && <MemorizeScreen />}
        <div style={{ display: activeTab === "daily" ? "block" : "none" }}>{DailyScreenJSX}</div>
        {activeTab === "tools" && <ToolsScreen />}
        {activeTab === "profile" && <ProfileScreen />}
      </div>

      {/* Bottom Tabs */}
      <div style={S.tabs}>
        {tabs.map(tab => {
          const isActive = activeTab === tab.id;
          return (
            <TabButton
              key={tab.id}
              isActive={isActive}
              onClick={() => { setActiveTab(tab.id); if (tab.id !== "surahs") setSelectedSurah(null); }}
              icon={tab.icon}
              label={tab.label}
              gold={gold}
              subtext={subtext}
            />
          );
        })}
      </div>
    </div>
  );
}

    ReactDOM.createRoot(document.getElementById('root')).render(<SimpleQuranApp />);
  </script>
</body>
</html>
